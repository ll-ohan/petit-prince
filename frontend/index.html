<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Petit Prince - Assistant RAG</title>
    <meta name="description" content="Explorez Le Petit Prince avec l'aide de l'intelligence artificielle">

    <style>
        :root {
            /* Colors inspired by Le Petit Prince */
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --secondary: #F5A623;
            --background: #FAFBFC;
            --surface: #FFFFFF;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --border: #E1E8ED;
            --error: #E74C3C;
            --success: #27AE60;
            --warning: #F39C12;
            --shadow: rgba(0, 0, 0, 0.1);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: "SF Mono", Monaco, "Cascadia Code", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--background);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            box-shadow: 0 2px 4px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: var(--font-main);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--background);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 3fr 1fr;
            }
        }

        /* Chat Container */
        .chat-section {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 1.5rem;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
        }

        .message-assistant {
            display: flex;
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            position: relative;
        }

        .message-user .message-content {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-assistant .message-content {
            background: var(--background);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.5rem;
        }

        /* Debug Info */
        .debug-info {
            margin-top: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .debug-section {
            margin-bottom: 1rem;
        }

        .debug-section-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .debug-section-content {
            font-size: 0.8rem;
            color: var(--text-light);
            padding-left: 1.5rem;
        }

        .source-item {
            background: white;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            border-left: 3px solid var(--border);
        }

        .source-tag {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .source-tag.high {
            background: #d4edda;
            color: #155724;
        }

        .source-tag.moderate {
            background: #fff3cd;
            color: #856404;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
        }

        .metric-label {
            color: var(--text-light);
        }

        .metric-value {
            font-weight: 600;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        /* Input Area */
        .chat-input-container {
            border-top: 1px solid var(--border);
            padding: 1rem 2rem;
            background: white;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: var(--font-main);
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-input::placeholder {
            color: var(--text-light);
        }

        .btn-send {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-send:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: var(--font-main);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle input:checked + .toggle-slider {
            background-color: var(--primary);
        }

        .toggle input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-indicator.success {
            background: #d4edda;
            color: #155724;
        }

        .status-indicator.success .status-dot {
            background: #28a745;
        }

        .status-indicator.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-indicator.error .status-dot {
            background: #dc3545;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--text-dark);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--error);
        }

        .toast.warning {
            background: var(--warning);
        }

        /* Loading */
        .loading-indicator {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            justify-content: center;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .empty-state-text {
            font-size: 0.95rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 0 1rem;
                margin: 1rem auto;
            }

            .header {
                padding: 1rem;
            }

            .header-title {
                font-size: 1.2rem;
            }

            .chat-section {
                height: calc(100vh - 300px);
            }

            .message-content {
                max-width: 90%;
            }
        }

        /* Collapsible */
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-content.open {
            max-height: 1000px;
        }

        .collapsible-icon {
            transition: transform 0.3s;
        }

        .collapsible-icon.open {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="header-title">⭐ Le Petit Prince - Assistant RAG</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" id="btn-init" title="Réindexer le livre">
                    🔄 Initialiser
                </button>
                <button class="btn btn-secondary" id="btn-clear" title="Effacer la conversation">
                    🗑️ Effacer
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container">
        <!-- Chat Section -->
        <section class="chat-section">
            <div class="chat-messages" id="chat-messages">
                <div class="empty-state">
                    <div class="empty-state-icon">🌟</div>
                    <h2 class="empty-state-title">Bienvenue dans l'univers du Petit Prince</h2>
                    <p class="empty-state-text">Posez-moi des questions sur cette œuvre magnifique</p>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <input
                        type="text"
                        class="chat-input"
                        id="message-input"
                        placeholder="Posez votre question sur Le Petit Prince..."
                        autocomplete="off"
                    />
                    <button class="btn-send" id="send-button">Envoyer</button>
                </div>
            </div>
        </section>

        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Status Card -->
            <div class="card">
                <h2 class="card-title">État du système</h2>
                <div class="status-indicator" id="api-status">
                    <span class="status-dot"></span>
                    <span id="status-text">Vérification...</span>
                </div>
            </div>

            <!-- Settings Card -->
            <div class="card">
                <h2 class="card-title">Paramètres</h2>

                <div class="form-group">
                    <label class="form-label" for="api-url">URL de l'API</label>
                    <input
                        type="text"
                        class="form-input"
                        id="api-url"
                        value="http://localhost:8000"
                        placeholder="http://localhost:8000"
                    />
                </div>

                <div class="toggle-container">
                    <label class="form-label" style="margin: 0;">Mode streaming</label>
                    <label class="toggle">
                        <input type="checkbox" id="streaming-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="toggle-container">
                    <label class="form-label" style="margin: 0;">Mode debug</label>
                    <label class="toggle">
                        <input type="checkbox" id="debug-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="toggle-container">
                    <label class="form-label" style="margin: 0;">Métriques étendues</label>
                    <label class="toggle">
                        <input type="checkbox" id="metrics-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
