version: '3.8'

services:
  # Le Petit Prince RAG API
  petit-prince-rag:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLAMA__BASE_URL=http://llama-cpp:8080
      - QDRANT__HOST=qdrant
      - LOGGING__LEVEL=INFO
    volumes:
      - ./var/data:/app/var/data:ro
      - ./config.yml:/app/config.yml:ro
    depends_on:
      - qdrant
      - llama-cpp
    networks:
      - rag-network
    restart: unless-stopped

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - rag-network
    restart: unless-stopped

  # Llama.cpp server (placeholder - configure based on your setup)
  llama-cpp:
    # Replace with actual llama.cpp Docker image or remove if running externally
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    environment:
      - MODEL_PATH=/models/your-model.gguf
    command: ["-m", "/models/your-model.gguf", "--host", "0.0.0.0", "--port", "8080"]
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Frontend web interface
  frontend:
    image: nginx:alpine
    container_name: petit-prince-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - petit-prince-rag
    networks:
      - rag-network
    restart: unless-stopped

networks:
  rag-network:
    driver: bridge

volumes:
  qdrant-storage:
