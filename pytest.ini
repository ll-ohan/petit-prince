[pytest]
# Minimum version
minversion = 8.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests
pythonpath = .

# Markers for categorizing tests
markers =
    unit: Unit tests - fast, isolated, no external dependencies
    integration: Integration tests - test component interactions
    edge_case: Edge case and error handling tests
    performance: Performance and benchmark tests
    slow: Tests that take significant time to run
    requires_qdrant: Tests requiring Qdrant connection
    requires_llama: Tests requiring llama.cpp server
    requires_all_services: Tests requiring all external services

# asyncio configuration
asyncio_mode = auto

# Coverage configuration
addopts =
    --strict-markers
    --strict-config
    --verbose
    --color=yes
    --tb=short
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80
    --maxfail=5
    -ra

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (prevent hanging)
timeout = 300

# Parallel execution (use with pytest-xdist: pytest -n auto)
# Uncomment to enable by default:
# addopts = -n auto
